version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - user-service
      - product-service
      - payment-service

  user-service:
    build: ./services/user-service
    ports:
      - "3001:3001"

  product-service:
    build: ./services/product-service
    ports:
      - "3002:3002"

  payment-service:
    build: ./services/payment-service
    ports:
      - "3003:3003"
